# nginx config สำหรับ Droplet
# ทำหน้าที่ expose Frappe ให้ BFF บน Railway เชื่อมต่อได้
# ไม่มี web (Next.js) และ bff — ทั้งสองอยู่บน Railway

upstream frappe {
    server frappe:8000;
}

# ---- Port 80 : Frappe Admin UI + API ----
server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Frappe assets
    location /assets/ {
        proxy_pass http://frappe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Frappe REST API (BFF บน Railway จะเรียกผ่านนี้)
    location /api/ {
        proxy_pass http://frappe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Frappe Admin UI (/, /app, /login ฯลฯ)
    location / {
        proxy_pass http://frappe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket สำหรับ Frappe realtime
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
    }
}

# ---- Port 8000 : Frappe direct (alternative สำหรับ Railway BFF) ----
server {
    listen 8000;
    server_name _;

    client_max_body_size 50m;

    location / {
        proxy_pass http://frappe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
